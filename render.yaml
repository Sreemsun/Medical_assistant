services:
  - type: web
    name: medical-assistant
    env: node
    plan: free
    pythonVersion: 3.12.8
    buildCommand: npm install --prefix server && python3 -m pip install -r ml/requirements.txt
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_EXECUTABLE
        value: python3
