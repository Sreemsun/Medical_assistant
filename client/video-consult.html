<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Consultation – MedAssist</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/video-consult.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="vc-page">
    <div class="vc-container">

      <!-- ── Pre-join screen ───────────────────────────────────── -->
      <div id="prejoinScreen" class="vc-prejoin">
        <div class="vc-prejoin-card">

          <div class="vc-icon">🎥</div>
          <h2 class="vc-title">Video Consultation</h2>
          <p class="vc-doctor-label" id="vcDoctorName"></p>

          <div class="vc-info-box">
            <div class="vc-info-row">
              <span class="vc-info-label">Room</span>
              <span class="vc-info-value" id="vcRoomDisplay"></span>
            </div>
            <div class="vc-info-row">
              <span class="vc-info-label">Joining as</span>
              <span class="vc-info-value" id="vcUserName"></span>
            </div>
          </div>

          <p class="vc-hint">
            Share the link below with your doctor so they can join the same room.
            Your camera and microphone will be requested when you join.
          </p>

          <div class="vc-share-row">
            <input type="text" id="vcShareUrl" class="vc-share-input" readonly />
            <button class="btn btn-ghost btn-sm" id="vcCopyBtn">Copy Link</button>
          </div>

          <div class="vc-checklist">
            <span class="vc-check-item">✓ End-to-end encrypted via Jitsi Meet</span>
            <span class="vc-check-item">✓ No account required for your doctor to join</span>
            <span class="vc-check-item">✓ Works in any modern browser</span>
          </div>

          <div class="vc-prejoin-actions">
            <button class="btn btn-ghost" onclick="history.back()">← Back</button>
            <button class="btn btn-primary btn-lg" id="vcJoinBtn">🎥 Join Consultation</button>
          </div>

        </div>
      </div>

      <!-- ── Live video room ──────────────────────────────────── -->
      <div id="videoRoom" class="vc-room hidden">
        <div class="vc-room-header">
          <div class="vc-room-info">
            <span class="vc-live-badge">● Live</span>
            <span class="vc-room-title" id="vcRoomTitle"></span>
          </div>
          <div class="vc-room-actions">
            <button class="btn btn-ghost btn-sm" id="vcCopyInCallBtn">Copy Room Link</button>
            <button class="btn btn-danger btn-sm" id="vcLeaveBtn">Leave Call</button>
          </div>
        </div>
        <div id="vcFrame" class="vc-frame"></div>
      </div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="js/utils.js"></script>
  <script src="js/video-consult.js"></script>
</body>
</html>
