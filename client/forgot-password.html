<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — MedAssist</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div id="navbar-placeholder"></div>

  <div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="auth-form-box animate-fade-in" style="max-width:420px;">
      <div class="auth-form-header">
        <h1 class="auth-form-title">Reset Your Password</h1>
        <p class="auth-form-subtitle">Enter your email and we'll send you a reset link</p>
      </div>

      <div id="form-alert"></div>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="send-btn">Send Reset Link</button>
      </form>

      <div class="auth-footer-link mt-4">
        <a href="login.html">← Back to Login</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = buildNavbar();
    Auth.redirectIfLoggedIn();

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { Form.showAlert('form-alert', 'Email is required.', 'warning'); return; }

      const btn = document.getElementById('send-btn');
      Loader.setBtn(btn, true, 'Sending...');
      const res = await api.post('/auth/forgot-password', { email });
      Loader.setBtn(btn, false);

      if (res) {
        Form.showAlert('form-alert', res.data.message || 'If that email exists, a reset link has been sent.', 'success');
        document.getElementById('forgot-form').reset();
      } else {
        Form.showAlert('form-alert', 'Request failed. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
