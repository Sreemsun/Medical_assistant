<!-- Verify Email -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — MedAssist</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card animate-fade-in" style="max-width:480px;text-align:center;">
      <div id="verifying-state">
        <div class="loader-spinner" style="margin:0 auto 24px;width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <h2>Verifying your email...</h2>
      </div>
      <div id="result-state" class="hidden"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = buildNavbar();

    (async () => {
      const token = new URLSearchParams(window.location.search).get('token');
      const resultEl = document.getElementById('result-state');
      const loadingEl = document.getElementById('verifying-state');

      if (!token) {
        loadingEl.classList.add('hidden');
        resultEl.classList.remove('hidden');
        resultEl.innerHTML = `<div class="alert alert-error">✕ Invalid verification link.</div><a href="login.html" class="btn btn-primary mt-4">Go to Login</a>`;
        return;
      }

      const res = await api.get(`/auth/verify-email/${token}`);
      loadingEl.classList.add('hidden');
      resultEl.classList.remove('hidden');

      if (res && res.ok) {
        resultEl.innerHTML = `
          <div style="font-size:3rem;margin-bottom:16px">✅</div>
          <h2 style="margin-bottom:8px">Email Verified!</h2>
          <p class="text-secondary mb-6">Your email has been verified successfully. You can now log in.</p>
          <a href="login.html" class="btn btn-primary">Go to Login</a>`;
      } else {
        resultEl.innerHTML = `
          <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
          <h2 style="margin-bottom:8px">Verification Failed</h2>
          <p class="text-secondary mb-6">${res?.data?.message || 'The link is invalid or expired.'}</p>
          <a href="forgot-password.html" class="btn btn-primary">Request New Link</a>`;
      }
    })();
  </script>
</body>
</html>
