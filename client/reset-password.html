<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MedAssist</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div id="navbar-placeholder"></div>

  <div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="auth-form-box animate-fade-in" style="max-width:420px;">
      <div class="auth-form-header">
        <h1 class="auth-form-title">Set New Password</h1>
        <p class="auth-form-subtitle">Enter your new password below</p>
      </div>

      <div id="invalid-token-msg" class="hidden">
        <div class="alert alert-error">
          ✕ This password reset link is invalid or has expired. <a href="forgot-password.html">Request a new one.</a>
        </div>
      </div>

      <div id="form-alert"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-control" placeholder="Min. 8 characters">
            <button type="button" class="input-toggle" id="togglePw">👁</button>
          </div>
          <div class="password-strength">
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-text" id="strength-text"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat new password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="reset-btn">Reset Password</button>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = buildNavbar();
    Auth.redirectIfLoggedIn();

    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('invalid-token-msg').classList.remove('hidden');
      document.getElementById('reset-form').classList.add('hidden');
    }

    document.getElementById('togglePw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    PasswordStrength.attach('password', 'strength-fill', 'strength-text');

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      Form.clearAlert('form-alert');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password.length < 8) { Form.showAlert('form-alert', 'Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { Form.showAlert('form-alert', 'Passwords do not match.', 'error'); return; }

      const btn = document.getElementById('reset-btn');
      Loader.setBtn(btn, true, 'Resetting...');
      const res = await api.post(`/auth/reset-password/${token}`, { password });
      Loader.setBtn(btn, false);

      if (res && res.ok) {
        Form.showAlert('form-alert', res.data.message, 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } else {
        Form.showAlert('form-alert', res?.data?.message || 'Reset failed. Link may have expired.', 'error');
      }
    });
  </script>
</body>
</html>
